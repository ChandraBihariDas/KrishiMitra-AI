
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrishiMitra Market</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f5f3;
      color: #222;
    }

    .topbar {
      background: white;
      padding: 12px 0;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-box img {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      object-fit: cover;
    }

    .logo-box h4 {
      margin: 0;
      color: #2f7d32;
      font-size: 20px;
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    .search-box input {
      border-radius: 6px;
    }

    .sidebar,
    .content-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .sidebar h5 {
      margin-bottom: 15px;
      color: #2f7d32;
    }

    .filter-link {
      display: block;
      text-decoration: none;
      color: #333;
      margin-bottom: 10px;
    }

    .filter-link:hover {
      color: #2f7d32;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .product-body {
      padding: 15px;
    }

    .product-title {
      font-weight: bold;
      margin-bottom: 8px;
      min-height: 45px;
    }

    .product-category {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      color: #2f7d32;
    }

    .old-price {
      text-decoration: line-through;
      color: #888;
      font-size: 14px;
      margin-left: 8px;
    }

    .product-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-buy {
      flex: 1;
      background: #2f7d32;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 6px;
    }

    .btn-details {
      flex: 1;
      background: #eee;
      border: none;
      padding: 8px;
      border-radius: 6px;
    }

    .cart-box {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 320px;
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      display: none;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }

    .language-select {
      width: 140px;
    }

    @media(max-width: 900px) {

      .sidebar {
        margin-bottom: 20px;
      }

      .cart-box {
        width: calc(100% - 40px);
      }
    }

  </style>
</head>
<body>

  <div class="topbar">

    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">

      <div class="logo-box">
        <img src="kishan.jpg" alt="logo">

        <div>
          <h4>KrishiMitra Market</h4>
          <small>Farm products and equipment</small>
        </div>
      </div>


      <div class="search-box flex-grow-1">
        <input type="text" id="searchInput" class="form-control" placeholder="Search products">

        <button class="btn btn-success" id="searchBtn">
          <i class="fa fa-search"></i>
        </button>
      </div>


      <div class="d-flex align-items-center gap-2">

        <select id="language" class="form-select language-select">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="or">Odia</option>
        </select>

        <button class="btn btn-outline-success" id="cartBtn">
          <i class="fa fa-shopping-cart"></i>
          Cart
          <span class="badge bg-success" id="cartCount">0</span>
        </button>

      </div>

    </div>

  </div>


  <div class="container my-4">

    <div class="row g-4">

      <div class="col-lg-3">

        <div class="sidebar">

          <h5>Categories</h5>

          <a href="#" class="filter-link" data-category="Seeds">Seeds</a>
          <a href="#" class="filter-link" data-category="Fertilizers">Fertilizers</a>
          <a href="#" class="filter-link" data-category="Pesticides">Pesticides</a>
          <a href="#" class="filter-link" data-category="Equipments">Equipments</a>

          <hr>

          <label class="mb-2"><strong>Price Range</strong></label>

          <input type="range" min="0" max="500000" value="500000" id="priceRange" class="form-range">

          <p>Up to ₹ <span id="priceValue">500000</span></p>

        </div>

      </div>


      <div class="col-lg-9">

        <div class="content-card">

          <div class="d-flex justify-content-between align-items-center mb-3">

            <div>
              <h4>Products</h4>
              <small id="productCount">0 items found</small>
            </div>

          </div>


          <div class="product-grid" id="productGrid"></div>

        </div>

      </div>

    </div>

  </div>


  <div class="cart-box" id="cartBox">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5>Your Cart</h5>

      <button class="btn-close" id="closeCart"></button>
    </div>


    <div id="cartItems"></div>


    <hr>

    <h6>Total: ₹ <span id="cartTotal">0</span></h6>

    <button class="btn btn-success w-100 mt-2">Checkout</button>

  </div>


  <script>

    const products = [

      {
        id: 1,
        title: "Wheat Seeds",
        category: "Seeds",
        price: 450,
        oldPrice: 520,
        image: "./images/wheat.jpg"
      },

      {
        id: 2,
        title: "Organic Fertilizer",
        category: "Fertilizers",
        price: 1200,
        image: "./images/organic.jpg"
      },

      {
        id: 3,
        title: "Pesticide Spray",
        category: "Pesticides",
        price: 850,
        image: "./images/pesticide.jpg"
      },

      {
        id: 4,
        title: "Farm Tractor",
        category: "Equipments",
        price: 450000,
        image: "./images/tractor.jpg"
      }
    ];


    let cart = [];


    function renderProducts(list) {

      const grid = document.getElementById("productGrid");
      grid.innerHTML = "";

      document.getElementById("productCount").textContent = `${list.length} items found`;


      list.forEach(product => {

        const card = document.createElement("div");
        card.className = "product-card";

        card.innerHTML = `

          <img src="${product.image}" alt="${product.title}">

          <div class="product-body">

            <div class="product-title">${product.title}</div>

            <div class="product-category">${product.category}</div>

            <div>
              <span class="price">₹${product.price}</span>

              ${product.oldPrice ? `<span class="old-price">₹${product.oldPrice}</span>` : ""}
            </div>

            <div class="product-buttons">

              <button class="btn-buy" onclick="addToCart(${product.id})">
                Add
              </button>

              <button class="btn-details">
                Details
              </button>

            </div>

          </div>
        `;

        grid.appendChild(card);
      });
    }


    function addToCart(id) {

      const product = products.find(item => item.id === id);

      if(!product) {
        return;
      }

      const existing = cart.find(item => item.id === id);

      if(existing) {
        existing.qty += 1;
      }

      else {
        cart.push({
          ...product,
          qty: 1
        });
      }

      renderCart();
    }


    function renderCart() {

      const cartItems = document.getElementById("cartItems");
      cartItems.innerHTML = "";

      let total = 0;
      let count = 0;


      cart.forEach(item => {

        total += item.price * item.qty;
        count += item.qty;


        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
          <div>
            <strong>${item.title}</strong><br>
            ₹${item.price} x ${item.qty}
          </div>

          <div>
            ₹${item.price * item.qty}
          </div>
        `;

        cartItems.appendChild(div);
      });


      document.getElementById("cartTotal").textContent = total;
      document.getElementById("cartCount").textContent = count;
    }


    document.getElementById("searchBtn").addEventListener("click", () => {

      const value = document.getElementById("searchInput").value.toLowerCase();

      const filtered = products.filter(product => {

        return product.title.toLowerCase().includes(value) ||
               product.category.toLowerCase().includes(value);
      });

      renderProducts(filtered);
    });


    document.querySelectorAll(".filter-link").forEach(link => {

      link.addEventListener("click", event => {

        event.preventDefault();

        const category = link.dataset.category;

        const filtered = products.filter(product => {
          return product.category === category;
        });

        renderProducts(filtered);
      });
    });


    document.getElementById("priceRange").addEventListener("input", event => {

      const maxPrice = Number(event.target.value);

      document.getElementById("priceValue").textContent = maxPrice;

      const filtered = products.filter(product => {
        return product.price <= maxPrice;
      });

      renderProducts(filtered);
    });


    document.getElementById("cartBtn").addEventListener("click", () => {

      document.getElementById("cartBox").style.display = "block";
    });


    document.getElementById("closeCart").addEventListener("click", () => {

      document.getElementById("cartBox").style.display = "none";
    });


    renderProducts(products);

  </script>

</body>
</html>
