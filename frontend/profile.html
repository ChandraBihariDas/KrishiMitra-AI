<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Farmer Profile — Save to Backend</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--muted:#445d46;--accent:#16a34a;--radius:12px}
    body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial;padding:28px;background:#f6fff7;color:var(--muted)}
    .wrap{max-width:820px;margin:0 auto}
    .card{background:#fff;padding:18px;border-radius:var(--radius);box-shadow:0 8px 30px rgba(12,58,37,0.06)}
    .avatar{width:92px;height:92px;border-radius:14px;object-fit:cover;border:3px solid rgba(34,197,94,0.12)}
    label{font-weight:600;color:#114022;display:block;margin-bottom:6px}
    input,textarea,select{width:100%;padding:10px;border-radius:8px;border:1px solid #eaf7ee;background:#fff}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{padding:10px 14px;border-radius:10px;border:0;cursor:pointer}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#22c55e);color:#fff}
    .btn-ghost{background:transparent;border:1px solid #e6f4ea}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .chip{background:#f6fff7;padding:8px 10px;border-radius:999px;border:1px solid rgba(34,197,94,0.06)}
    .notice{margin-top:10px;padding:10px;border-radius:8px;display:none}
    @media(max-width:700px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
        <img id="avatar" class="avatar" src="" alt="avatar">
        <div style="flex:1">
          <h2 style="margin:0">Farmer Profile</h2>
          <div style="font-size:0.95rem;color:#2f6b45"> Please Upload Your Profile Photo.</div>
        </div>
      </header>

      <form id="profileForm" autocomplete="off">
        <input type="hidden" id="profileId">

        <div style="display:flex;gap:12px;align-items:center">
          <div style="flex:1">
            <label>Profile Photo</label>
            <input id="photoInput" type="file" accept="image/*">
            <div style="font-size:0.9rem;color:#2f6b45">Tip: choose a clear portrait or in-field photo</div>
          </div>
          <div style="width:120px;text-align:center">
            <button type="button" id="removePhoto" class="btn btn-ghost">Remove</button>
          </div>
        </div>

        <div style="margin-top:12px">
          <label for="name">Full name *</label>
          <input id="name" type="text" required placeholder="e.g. Ram Lal">
        </div>

        <div class="row" style="margin-top:12px">
          <div>
            <label for="phone">Phone *</label>
            <input id="phone" type="text" required placeholder="10-digit mobile number">
          </div>
          <div>
            <label for="location">Location *</label>
            <input id="location" type="text" required placeholder="Village, City">
          </div>
        </div>

        <div class="row" style="margin-top:12px">
          <div>
            <label for="crops">Current Crops *</label>
            <input id="crops" type="text" placeholder="Comma separated (Wheat, Maize)" required>
          </div>
          <div>
            <label for="size">Farm size (acres)</label>
            <input id="size" type="number" step="0.01" placeholder="e.g. 2.5">
          </div>
        </div>

        <div style="margin-top:12px">
          <label for="bio">Bio / Notes</label>
          <textarea id="bio" placeholder="Short description, practices, concerns..."></textarea>
        </div>

        <div style="margin-top:12px">
          <label>Past Crops (optional)</label>
          <div style="display:flex;gap:8px;margin-top:8px">
            <input id="pastName" type="text" placeholder="Crop name (e.g. Maize)" style="flex:1">
            <input id="pastYear" type="number" placeholder="Year" style="width:110px">
            <input id="pastYield" type="text" placeholder="Yield" style="width:140px">
            <button type="button" id="addPast" class="btn btn-primary">Add</button>
          </div>
          <div class="chips" id="chips"></div>
        </div>

        <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
          <button type="submit" class="btn btn-primary">Save Profile</button>
          <button type="button" id="resetBtn" class="btn btn-ghost">Reset</button>
          <div id="status" class="notice"></div>
        </div>
      </form>
    </div>
  </div>

<script>
  const BACKEND_URL = 'http://localhost:4000/api/farmers';

  const form = document.getElementById('profileForm');
  const avatar = document.getElementById('avatar');
  const photoInput = document.getElementById('photoInput');
  const removePhoto = document.getElementById('removePhoto');
  const status = document.getElementById('status');

  const idEl = document.getElementById('profileId');
  const nameEl = document.getElementById('name');
  const phoneEl = document.getElementById('phone');
  const locationEl = document.getElementById('location');
  const sizeEl = document.getElementById('size');
  const cropsEl = document.getElementById('crops');
  const bioEl = document.getElementById('bio');

  const pastName = document.getElementById('pastName');
  const pastYear = document.getElementById('pastYear');
  const pastYield = document.getElementById('pastYield');
  const addPast = document.getElementById('addPast');
  const chips = document.getElementById('chips');

  let pastCrops = [];

  // preview file when chosen
  photoInput.addEventListener('change', e=>{
    const f = e.target.files && e.target.files[0]; if(!f) return;
    if(!f.type.startsWith('image/')) return alert('Please choose an image file');
    const r = new FileReader();
    r.onload = ()=>{ avatar.src = r.result; };
    r.readAsDataURL(f);
  });
  removePhoto.addEventListener('click', ()=>{ avatar.src=''; photoInput.value=''; });

  function renderChips(){
    chips.innerHTML = '';
    pastCrops.forEach((p, i)=>{
      const el = document.createElement('div'); el.className='chip';
      el.innerHTML = `<strong>${escapeHtml(p.name)}</strong> <small>(${escapeHtml(p.year || '-')})</small> &nbsp; ${escapeHtml(p.yield||'')} <span style="margin-left:8px;cursor:pointer" data-i="${i}">✕</span>`;
      el.querySelector('[data-i]').addEventListener('click', ()=>{ pastCrops.splice(i,1); renderChips(); });
      chips.appendChild(el);
    });
  }

  addPast.addEventListener('click', ()=>{
    const name = (pastName.value||'').trim();
    if(!name) return alert('Enter crop name');
    pastCrops.unshift({ name, year: (pastYear.value||'').trim(), yield: (pastYield.value||'').trim() });
    pastName.value=''; pastYear.value=''; pastYield.value='';
    renderChips();
  });

  // submit: use FormData if file present, else JSON
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const file = photoInput.files && photoInput.files[0];

    // basic validation
    if(!nameEl.value.trim()||!phoneEl.value.trim()||!locationEl.value.trim()||!cropsEl.value.trim()){
      showStatus('Please fill required fields (name, phone, location, crops)', true);
      return;
    }

    const baseObj = {
      id: idEl.value || generateId(),
      name: nameEl.value.trim(),
      phone: phoneEl.value.trim(),
      location: locationEl.value.trim(),
      size: (sizeEl.value||'').trim(),
      crops: cropsEl.value.trim(),
      bio: (bioEl.value||'').trim(),
      past: pastCrops
    };

    try{
      showStatus('Saving to server...', false);

      let res;
      if(file){
        // send multipart/form-data so server multer/cloudinary middleware receives file
        const fd = new FormData();
        fd.append('photo', file); // IMPORTANT: field name must match middleware
        fd.append('name', baseObj.name);
        fd.append('phone', baseObj.phone);
        fd.append('location', baseObj.location);
        fd.append('size', baseObj.size);
        fd.append('crops', baseObj.crops);
        fd.append('bio', baseObj.bio);
        fd.append('past', JSON.stringify(baseObj.past || [])); // send array as JSON string

        res = await fetch(BACKEND_URL, { method: 'POST', body: fd });
      } else {
        // send JSON (no file)
        res = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ...baseObj, photo: '' })
        });
      }

      if(!res.ok){
        const text = await res.text().catch(()=>null);
        throw new Error('Server returned ' + res.status + (text?(': '+text):''));
      }

      const data = await res.json().catch(()=>null);
      showStatus('Profile saved successfully 👍', false);
      console.log('Saved response:', data);
    }catch(err){
      showStatus('Save failed: '+err.message, true);
      console.error(err);
    }
  });

  function showStatus(msg, isError=false){
    status.style.display='block'; status.textContent = msg;
    status.style.background = isError? 'rgba(255,220,220,0.9)' : 'rgba(220,255,230,0.9)';
    status.style.color = isError? '#8b1f1f' : '#11582f';
  }
  function generateId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
  function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }
</script>
</body>
</html>
