
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Government Subsidies</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f5f3;
      color: #222;
    }

    header {
      background: white;
      padding: 15px 20px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .topbar {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      background: #2f7d32;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .brand h1 {
      color: #2f7d32;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .brand p {
      color: #666;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input,
    select,
    button {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #2f7d32;
      color: white;
      border: none;
      cursor: pointer;
    }

    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }

    .scheme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card,
    .sidebar-box {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      color: #2f7d32;
      margin-bottom: 10px;
    }

    .card p {
      margin-bottom: 10px;
      color: #555;
      line-height: 1.5;
    }

    .benefit {
      background: #f3f7f3;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .apply-btn {
      flex: 1;
      background: #2f7d32;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
    }

    .learn-btn {
      flex: 1;
      background: #eee;
      border: none;
      padding: 10px;
      border-radius: 6px;
    }

    .sidebar-box h3 {
      margin-bottom: 15px;
      color: #2f7d32;
    }

    .profile {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      background: #2f7d32;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    .links a {
      display: block;
      margin-bottom: 10px;
      text-decoration: none;
      color: #2f7d32;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: white;
      width: 100%;
      max-width: 600px;
      border-radius: 10px;
      padding: 20px;
    }

    .modal h2 {
      color: #2f7d32;
      margin-bottom: 10px;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    @media(max-width: 900px) {

      .container {
        grid-template-columns: 1fr;
      }

      .controls {
        width: 100%;
      }

      input,
      select,
      button {
        width: 100%;
      }
    }

  </style>
</head>
<body>

  <header>

    <div class="topbar">

      <div class="brand">

        <div class="logo">🌿</div>

        <div>
          <h1>KrishiMitra Subsidies</h1>
          <p>Government schemes and support for farmers</p>
        </div>

      </div>


      <div class="controls">

        <input type="text" id="searchBox" placeholder="Search schemes">

        <select id="categoryFilter">
          <option value="all">All Categories</option>
          <option value="income">Income</option>
          <option value="digital">Digital</option>
          <option value="infrastructure">Infrastructure</option>
          <option value="sustainable">Sustainable</option>
        </select>

        <button id="applicationBtn">My Applications</button>

      </div>

    </div>

  </header>


  <div class="container">

    <div>

      <div class="scheme-grid" id="schemeGrid"></div>

    </div>


    <div>

      <div class="sidebar-box">

        <h3>Farmer Profile</h3>

        <div class="profile">

          <div class="avatar" id="avatar">RM</div>

          <div>
            <strong id="farmerName">Raj Mani</strong><br>
            <small id="farmInfo">8 acres · Potato Farming</small>
          </div>

        </div>

      </div>


      <div class="sidebar-box">

        <h3>Important Links</h3>

        <div class="links">
          <a href="https://pmkisan.gov.in" target="_blank">PM Kisan Portal</a>
          <a href="https://agriinfra.dac.gov.in" target="_blank">Agri Infra Portal</a>
          <a href="https://nfdb.gov.in" target="_blank">PM Matsya Portal</a>
        </div>

      </div>


      <div class="sidebar-box">

        <h3>Tips</h3>

        <p>Keep Aadhaar card, bank details and land documents ready before applying.</p>

      </div>

    </div>

  </div>


  <div class="modal-bg" id="modalBg">

    <div class="modal">

      <h2 id="modalTitle">Scheme Details</h2>

      <p id="modalText"></p>

      <div class="modal-buttons">

        <button id="closeModal">Close</button>

        <button id="visitBtn">Visit Portal</button>

      </div>

    </div>

  </div>


  <script>

    const schemes = [

      {
        id: 1,
        title: "PM Kisan Samman Nidhi",
        category: "income",
        description: "Income support for small and marginal farmers.",
        benefits: "₹6000 per year directly into bank account.",
        eligibility: "Registered farmers",
        link: "https://pmkisan.gov.in"
      },

      {
        id: 2,
        title: "Digital Agriculture Mission",
        category: "digital",
        description: "Digital tools and farming technology support.",
        benefits: "Advisory services and smart farming apps.",
        eligibility: "All farmers",
        link: "https://agriwelfare.gov.in"
      },

      {
        id: 3,
        title: "Agri Infrastructure Fund",
        category: "infrastructure",
        description: "Support for warehouses and storage facilities.",
        benefits: "Loans up to ₹2 crore.",
        eligibility: "FPOs and agri entrepreneurs",
        link: "https://agriinfra.dac.gov.in"
      },

      {
        id: 4,
        title: "Organic Farming Support",
        category: "sustainable",
        description: "Encourages eco-friendly farming practices.",
        benefits: "Subsidy on organic farming methods.",
        eligibility: "Farmers shifting to organic farming",
        link: "https://pgsindia-ncof.gov.in"
      }
    ];


    const schemeGrid = document.getElementById("schemeGrid");


    function renderSchemes(list) {

      schemeGrid.innerHTML = "";


      list.forEach(scheme => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `

          <h3>${scheme.title}</h3>

          <p>${scheme.description}</p>

          <div class="benefit">
            <strong>Benefits:</strong><br>
            ${scheme.benefits}
          </div>

          <p>
            <strong>Eligibility:</strong><br>
            ${scheme.eligibility}
          </p>

          <div class="actions">

            <button class="apply-btn" onclick="openModal(${scheme.id})">
              Apply
            </button>

            <button class="learn-btn">
              Learn More
            </button>

          </div>
        `;

        schemeGrid.appendChild(card);
      });
    }


    function filterSchemes() {

      const searchValue = document.getElementById("searchBox").value.toLowerCase();

      const category = document.getElementById("categoryFilter").value;


      const filtered = schemes.filter(scheme => {

        const matchesSearch = scheme.title.toLowerCase().includes(searchValue);

        const matchesCategory = category === "all" || scheme.category === category;

        return matchesSearch && matchesCategory;
      });


      renderSchemes(filtered);
    }


    document.getElementById("searchBox").addEventListener("input", filterSchemes);

    document.getElementById("categoryFilter").addEventListener("change", filterSchemes);


    const modalBg = document.getElementById("modalBg");

    let activeLink = "";


    function openModal(id) {

      const scheme = schemes.find(item => item.id === id);

      if(!scheme) {
        return;
      }

      activeLink = scheme.link;

      document.getElementById("modalTitle").textContent = scheme.title;

      document.getElementById("modalText").innerHTML = `
        <strong>Benefits:</strong> ${scheme.benefits}<br><br>
        <strong>Eligibility:</strong> ${scheme.eligibility}
      `;

      modalBg.style.display = "flex";
    }


    document.getElementById("closeModal").addEventListener("click", () => {

      modalBg.style.display = "none";
    });


    document.getElementById("visitBtn").addEventListener("click", () => {

      if(activeLink) {
        window.open(activeLink, "_blank");
      }
    });


    window.addEventListener("click", event => {

      if(event.target === modalBg) {
        modalBg.style.display = "none";
      }
    });


    renderSchemes(schemes);

  </script>

</body>
</html>
