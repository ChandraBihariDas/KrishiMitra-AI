<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Sensor Data Dashboard</title>
    <style>
        /* Creative Theme: Garden Monitoring Dashboard */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .sensor-card {
            background: linear-gradient(145deg, #f0f8ff, #e6f3ff);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .sensor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        .sensor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }
        .sensor-icon {
            font-size: 2em;
            text-align: center;
            margin-bottom: 10px;
            color: #4facfe;
        }
        .sensor-label {
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            color: #2c3e50;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[type="range"], input[type="number"] {
            width: 80%;
            margin-bottom: 10px;
            accent-color: #00f2fe;
        }
        input[type="number"] {
            text-align: center;
            padding: 5px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1.1em;
        }
        .value-display {
            font-size: 1.2em;
            font-weight: bold;
            color: #27ae60;
            text-align: center;
        }
        .submit-btn {
            display: block;
            margin: 0 auto;
            padding: 15px 30px;
            font-size: 1.2em;
            background: linear-gradient(145deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }
        .submit-btn:hover {
            transform: scale(1.05);
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 1.1em;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        /* Icon placeholders using Unicode */
        .temp .sensor-icon { content: ''; }
        .humidity .sensor-icon { content: ''; }
        .light .sensor-icon { content: ''; }
        .gas .sensor-icon { content: ''; }
        .soil-temp .sensor-icon { content: ''; }
        .soil-moisture .sensor-icon { content: ''; }
        .soil-ph .sensor-icon { content: ''; }
        .soil-npk .sensor-icon { content: ''; }
    </style>
</head>
<body>
    <div class="container">
        <h1>IoT Garden Sensor Dashboard</h1>
        <div class="sensor-grid" id="sensorGrid">
            <!-- Cards will be dynamically generated by JS -->
        </div>
        <button class="submit-btn" onclick="submitData()">Submit Sensor Data </button>
        <div id="status" class="status"></div>
    </div>

    <script>
        // Define sensor configurations with increased max limits and better defaults
        const sensors = [
            { id: 'temp', label: 'Air Temperature (°C)', min: -10, max: 60, step: 0.1, default: 25, icon: '' },
            { id: 'humidity', label: 'Humidity (%)', min: 0, max: 100, step: 1, default: 50, icon: '' },
            { id: 'light', label: 'Light Intensity (lux)', min: 0, max: 100000, step: 100, default: 5000, icon: '' },
            { id: 'gas', label: 'Gas Level (ppm)', min: 0, max: 1000, step: 1, default: 100, icon: '' },
            { id: 'soil_temp', label: 'Soil Temperature (°C)', min: 0, max: 50, step: 0.1, default: 20, icon: '' },
            { id: 'soil_moisture', label: 'Soil Moisture (%)', min: 0, max: 100, step: 1, default: 60, icon: '' },
            { id: 'soil_ph', label: 'Soil pH (0-14)', min: 0, max: 14, step: 0.1, default: 7, icon: '' },
            { id: 'soil_npk', label: 'Soil NPK Index', min: 0, max: 1000, step: 1, default: 200, icon: '' }
        ];

        // Generate sensor cards
        function generateCards() {
            const grid = document.getElementById('sensorGrid');
            sensors.forEach(sensor => {
                const card = document.createElement('div');
                card.className = `sensor-card ${sensor.id}`;
                card.innerHTML = `
                    <div class="sensor-icon">${sensor.icon}</div>
                    <div class="sensor-label">${sensor.label}</div>
                    <div class="input-group">
                        <input type="range" id="${sensor.id}_slider" min="${sensor.min}" max="${sensor.max}" step="${sensor.step}" value="${sensor.default}" oninput="updateValue('${sensor.id}')">
                        <input type="number" id="${sensor.id}_input" min="${sensor.min}" max="${sensor.max}" step="${sensor.step}" value="${sensor.default}" oninput="updateSlider('${sensor.id}')">
                        <div class="value-display" id="${sensor.id}_display">${sensor.default}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Update display when slider changes
        function updateValue(id) {
            const slider = document.getElementById(`${id}_slider`);
            const input = document.getElementById(`${id}_input`);
            const display = document.getElementById(`${id}_display`);
            const value = parseFloat(slider.value);
            input.value = value;
            display.textContent = value.toFixed(id === 'temp' || id === 'soil_temp' || id === 'soil_ph' ? 1 : 0);
        }

        // Update slider when input changes
        function updateSlider(id) {
            const slider = document.getElementById(`${id}_slider`);
            const input = document.getElementById(`${id}_input`);
            const display = document.getElementById(`${id}_display`);
            const value = parseFloat(input.value);
            slider.value = value;
            display.textContent = value.toFixed(id === 'temp' || id === 'soil_temp' || id === 'soil_ph' ? 1 : 0);
        }

        // Collect data and submit to API
        async function submitData() {
            const data = {};
            sensors.forEach(sensor => {
                data[sensor.id] = parseFloat(document.getElementById(`${sensor.id}_input`).value);
            });

            const btn = document.querySelector('.submit-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            status.style.display = 'none';

            try {
                const response = await fetch('https://krishimitra-ai-wpik.onrender.com/api/iot/data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    status.textContent = ' Your sensor data has been submitted and is now being gathered and analyzed for insights!';
                    status.className = 'status success';
                    status.style.display = 'block';
                    // Reset values to defaults (optional)
                    sensors.forEach(sensor => {
                        document.getElementById(`${sensor.id}_input`).value = sensor.default;
                        updateValue(sensor.id);
                    });
                    // Redirect to check2.html after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'check2.html';
                    }, 2000);
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                status.textContent = ` Error: ${error.message}. Check if the API is running on localhost:4000.`;
                status.className = 'status error';
                status.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Sensor Data ';
            }
        }

        // Initialize on load
        window.onload = generateCards;
    </script>
</body>
</html>
