
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Prices</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f1f4f1;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .header h1 {
      color: #2f7d32;
      margin-bottom: 5px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-bottom: 15px;
      color: #2f7d32;
      font-size: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #2f7d32;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    .price-boxes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .price-box {
      background: #f7f7f7;
      padding: 18px;
      border-radius: 8px;
      text-align: center;
    }

    .price-box h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      color: #2f7d32;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #f3f3f3;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: 220px;
      margin-top: 25px;
    }

    .bar-wrapper {
      flex: 1;
      text-align: center;
    }

    .bar {
      background: #2f7d32;
      border-radius: 6px 6px 0 0;
    }

    .recommendations {
      margin-top: 25px;
    }

    .recommendations ul {
      margin-left: 20px;
      margin-top: 10px;
    }

    @media(max-width: 850px) {

      .layout {
        grid-template-columns: 1fr;
      }

      .price-boxes {
        grid-template-columns: 1fr;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>Agricultural Market Prices</h1>
      <p>Commodity prices and market trends</p>
    </div>


    <div class="layout">

      <div>

        <div class="card">

          <h2>Filters</h2>

          <div class="field">
            <label>State</label>
            <select id="state">
              <option>Odisha</option>
              <option>Bihar</option>
              <option>Punjab</option>
              <option>Maharashtra</option>
            </select>
          </div>

          <div class="field">
            <label>Mandi</label>
            <select id="mandi">
              <option>Baripada</option>
              <option>Cuttack</option>
              <option>Patna</option>
              <option>Ludhiana</option>
            </select>
          </div>

          <div class="field">
            <label>Commodity</label>
            <select id="commodity">
              <option>Rice</option>
              <option>Wheat</option>
              <option>Maize</option>
              <option>Potato</option>
              <option>Tomato</option>
            </select>
          </div>

          <button id="loadBtn">Get Market Data</button>

        </div>

      </div>


      <div>

        <div class="card" id="marketCard" style="display:none">

          <div class="price-boxes">

            <div class="price-box">
              <h3>Minimum Price</h3>
              <div class="price" id="minPrice">₹0</div>
            </div>

            <div class="price-box">
              <h3>Modal Price</h3>
              <div class="price" id="modalPrice">₹0</div>
            </div>

            <div class="price-box">
              <h3>Maximum Price</h3>
              <div class="price" id="maxPrice">₹0</div>
            </div>

          </div>


          <h2>Price Trend</h2>

          <div class="chart" id="chart"></div>


          <h2 style="margin-top:30px">Market Prices</h2>

          <table>

            <thead>
              <tr>
                <th>Commodity</th>
                <th>Market</th>
                <th>Min Price</th>
                <th>Modal Price</th>
                <th>Max Price</th>
              </tr>
            </thead>

            <tbody id="tableBody"></tbody>

          </table>


          <div class="recommendations">

            <h2>Market Insights</h2>

            <ul id="insightList"></ul>

          </div>

        </div>

      </div>

    </div>

  </div>


  <script>

    const loadBtn = document.getElementById("loadBtn");


    function randomPrice(base) {
      return Math.floor(base + Math.random() * 500);
    }


    function generateData() {

      const min = randomPrice(1500);
      const modal = min + 300;
      const max = modal + 400;

      return {
        min,
        modal,
        max
      };
    }


    function updateChart() {

      const chart = document.getElementById("chart");
      chart.innerHTML = "";

      const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

      days.forEach(day => {

        const value = randomPrice(1000);
        const height = value / 25;

        const wrapper = document.createElement("div");
        wrapper.className = "bar-wrapper";

        wrapper.innerHTML = `
          <div class="bar" style="height:${height}px"></div>
          <p>${day}</p>
        `;

        chart.appendChild(wrapper);
      });
    }


    function updateTable(commodity, mandi) {

      const tableBody = document.getElementById("tableBody");
      tableBody.innerHTML = "";

      const markets = [
        "Baripada",
        "Cuttack",
        "Patna",
        "Ludhiana"
      ];


      markets.forEach(market => {

        const row = document.createElement("tr");

        const min = randomPrice(1200);
        const modal = min + 200;
        const max = modal + 300;

        row.innerHTML = `
          <td>${commodity}</td>
          <td>${market}</td>
          <td>₹${min}</td>
          <td>₹${modal}</td>
          <td>₹${max}</td>
        `;

        tableBody.appendChild(row);
      });
    }


    function updateInsights() {

      const insightList = document.getElementById("insightList");
      insightList.innerHTML = "";

      const insights = [
        "Prices are stable in nearby markets.",
        "Current rates are good for selling.",
        "Compare mandi prices before final sale.",
        "Monitor daily market updates regularly."
      ];

      insights.forEach(text => {

        const li = document.createElement("li");
        li.textContent = text;

        insightList.appendChild(li);
      });
    }


    loadBtn.addEventListener("click", () => {

      const commodity = document.getElementById("commodity").value;
      const mandi = document.getElementById("mandi").value;

      const data = generateData();

      document.getElementById("marketCard").style.display = "block";

      document.getElementById("minPrice").textContent = "₹" + data.min;
      document.getElementById("modalPrice").textContent = "₹" + data.modal;
      document.getElementById("maxPrice").textContent = "₹" + data.max;

      updateChart();
      updateTable(commodity, mandi);
      updateInsights();
    });

  </script>

</body>
</html>
