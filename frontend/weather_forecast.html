
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Forecast</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #eef3ee;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .header h1 {
      color: #2d7a2d;
      margin-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-bottom: 15px;
      color: #2d7a2d;
      font-size: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #2d7a2d;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    .weather-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .temp {
      font-size: 48px;
      font-weight: bold;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .stat-box {
      background: #f5f5f5;
      padding: 14px;
      border-radius: 8px;
      text-align: center;
    }

    .forecast {
      margin-top: 25px;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }

    .forecast-item {
      background: #f7f7f7;
      padding: 14px;
      border-radius: 8px;
      text-align: center;
    }

    .recommendations {
      margin-top: 25px;
    }

    .recommendations ul {
      margin-left: 20px;
      margin-top: 10px;
    }

    @media(max-width: 850px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>Agricultural Weather Forecast</h1>
      <p>Weather details and farming suggestions</p>
    </div>


    <div class="grid">

      <div>

        <div class="card">
          <h2>Location Details</h2>

          <div class="field">
            <label>Location</label>
            <input type="text" id="location" placeholder="Enter city or village name">
          </div>

          <div class="field">
            <label>Crop Type</label>
            <select id="cropType">
              <option>Rice</option>
              <option>Wheat</option>
              <option>Maize</option>
              <option>Cotton</option>
            </select>
          </div>

          <div class="field">
            <label>Farm Activity</label>
            <select id="activity">
              <option>Irrigation</option>
              <option>Harvesting</option>
              <option>Spraying</option>
              <option>Sowing</option>
            </select>
          </div>

          <button id="weatherBtn">Get Forecast</button>
        </div>

      </div>


      <div>

        <div class="card" id="weatherCard" style="display:none">

          <div class="weather-top">
            <div>
              <h2 id="cityName">Bhopal</h2>
              <p id="condition">Cloudy</p>
            </div>

            <div class="temp" id="temperature">29°C</div>
          </div>

          <div class="stats">

            <div class="stat-box">
              <h3 id="humidity">70%</h3>
              <p>Humidity</p>
            </div>

            <div class="stat-box">
              <h3 id="wind">12 km/h</h3>
              <p>Wind Speed</p>
            </div>

            <div class="stat-box">
              <h3 id="rain">4 mm</h3>
              <p>Rainfall</p>
            </div>

          </div>


          <div class="forecast">
            <h2>7 Day Forecast</h2>

            <div class="forecast-grid" id="forecastGrid"></div>
          </div>


          <div class="recommendations">
            <h2>Recommendations</h2>

            <ul id="recommendationList"></ul>
          </div>

        </div>

      </div>

    </div>

  </div>


  <script>

    const weatherBtn = document.getElementById("weatherBtn");


    function randomWeather() {

      const conditions = [
        "Sunny",
        "Cloudy",
        "Rainy",
        "Partly Cloudy"
      ];

      return {
        temp: Math.floor(Math.random() * 10) + 25,
        humidity: Math.floor(Math.random() * 40) + 40,
        wind: Math.floor(Math.random() * 15) + 5,
        rain: Math.floor(Math.random() * 10),
        condition: conditions[Math.floor(Math.random() * conditions.length)]
      };
    }


    function generateForecast() {

      const days = [
        "Mon",
        "Tue",
        "Wed",
        "Thu",
        "Fri",
        "Sat",
        "Sun"
      ];

      const grid = document.getElementById("forecastGrid");
      grid.innerHTML = "";

      days.forEach(day => {

        const data = randomWeather();

        const item = document.createElement("div");
        item.className = "forecast-item";

        item.innerHTML = `
          <strong>${day}</strong><br><br>
          ${data.condition}<br>
          ${data.temp}°C
        `;

        grid.appendChild(item);
      });
    }


    function updateRecommendations(weather) {

      const list = document.getElementById("recommendationList");
      list.innerHTML = "";

      const recommendations = [];

      if(weather.rain > 5) {
        recommendations.push("Heavy rainfall expected. Avoid spraying.");
      }

      if(weather.temp > 32) {
        recommendations.push("Temperature is high. Increase irrigation.");
      }

      if(weather.wind > 15) {
        recommendations.push("Strong wind detected. Delay pesticide spray.");
      }

      recommendations.push("Check soil moisture regularly.");
      recommendations.push("Monitor weather updates during the day.");


      recommendations.forEach(text => {

        const li = document.createElement("li");
        li.textContent = text;

        list.appendChild(li);
      });
    }


    weatherBtn.addEventListener("click", () => {

      const location = document.getElementById("location").value || "Bhopal";

      const weather = randomWeather();

      document.getElementById("weatherCard").style.display = "block";

      document.getElementById("cityName").textContent = location;
      document.getElementById("condition").textContent = weather.condition;
      document.getElementById("temperature").textContent = weather.temp + "°C";

      document.getElementById("humidity").textContent = weather.humidity + "%";
      document.getElementById("wind").textContent = weather.wind + " km/h";
      document.getElementById("rain").textContent = weather.rain + " mm";

      generateForecast();
      updateRecommendations(weather);
    });

  </script>

</body>
</html>
